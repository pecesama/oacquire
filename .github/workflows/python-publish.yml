# Publishes OAcquire to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens, no secrets.
#
# ┌─ REQUIRED PyPI "pending publisher" config (must match EXACTLY):
# │    https://pypi.org/manage/account/publishing/
# │      PyPI Project Name : oacquire
# │      Owner             : pecesama
# │      Repository name   : oacquire
# │      Workflow name     : python-publish.yml   ← this file's name
# │      Environment name  : pypi
# └─ Also create a GitHub Environment named "pypi" (Settings → Environments).
#
# Docs: https://docs.pypi.org/trusted-publishers/

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    # The environment name here MUST match the one registered on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/oacquire
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
